<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>歴史探偵事件簿・壱 本能寺の変 v3 | 戦国探索アドベンチャー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --sumi:#171310; --sumi2:#241d17;
    --kin:#d4a94e; --hi:#c43a2a;
    --kinari:#f2e8d5; --hai:#9a9184;
    --line:rgba(212,169,78,.35); --ok:#4e8c5a; --ao:#5b7fc7;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--sumi);
    background-image:
      radial-gradient(900px 500px at 85% -5%, rgba(212,169,78,.09), transparent 60%),
      radial-gradient(700px 500px at -5% 105%, rgba(196,58,42,.08), transparent 60%);
    color:var(--kinari);
    font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",sans-serif;
    line-height:1.75;font-size:15px;
  }
  #root{max-width:760px;margin:0 auto;min-height:100%;padding:0 14px 64px}
  .mincho{font-family:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 2px;border-bottom:1px solid var(--line);margin-bottom:14px;gap:8px}
  .topbar .brand{font-size:13px;letter-spacing:.25em;color:var(--kin);white-space:nowrap}
  .backlink{background:none;border:none;color:var(--hai);font-size:13px;cursor:pointer;padding:6px 0;font-family:inherit;white-space:nowrap}

  .btn{display:inline-block;border:1px solid var(--line);background:var(--sumi2);color:var(--kinari);
    padding:12px 18px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:15px;transition:transform .08s}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--hi);border-color:transparent;color:#fff;font-weight:700}
  .btn.gold{background:transparent;border-color:var(--kin);color:var(--kin)}
  .btn.small{padding:7px 12px;font-size:13px}
  .btn.block{display:block;width:100%;text-align:center}
  .btn:disabled{opacity:.4;cursor:default}
  .eyebrow{font-size:11px;letter-spacing:.4em;color:var(--kin);margin-bottom:8px}
  .note{font-size:12.5px;color:var(--hai)}

  .cover{padding-top:5vh;text-align:center}
  .cover .case-no{font-size:11px;letter-spacing:.5em;color:var(--hai)}
  .title-wrap{position:relative;display:inline-block;margin:20px auto 6px}
  .v-title{writing-mode:vertical-rl;font-size:38px;font-weight:800;letter-spacing:.14em;line-height:1.5;height:270px;text-shadow:0 2px 12px rgba(0,0,0,.6)}
  .v-sub{writing-mode:vertical-rl;font-size:13px;letter-spacing:.4em;color:var(--kin);height:240px;display:inline-block;margin-right:22px;vertical-align:top;padding-top:10px}
  .stamp{position:absolute;right:-54px;top:-4px;width:70px;height:70px;border:3px solid var(--hi);border-radius:50%;
    color:var(--hi);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;transform:rotate(12deg)}
  .cover .lead{max-width:460px;margin:14px auto 24px;color:var(--hai);font-size:13.5px}
  .cover .menu{display:flex;flex-direction:column;gap:11px;max-width:340px;margin:0 auto}

  .paper{background:var(--kinari);color:#2b2317;border-radius:4px;padding:20px 18px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);position:relative;overflow:hidden;margin-bottom:14px}
  .paper:before{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(120,90,40,.045) 0 2px, transparent 2px 5px)}
  .paper h3{font-size:17px;margin-bottom:8px}
  .paper .meta{font-size:12px;color:#8a7a58;letter-spacing:.2em;margin-bottom:6px}
  .paper p{margin-bottom:9px}
  .paper ul{padding-left:1.2em;margin-bottom:8px}
  .paper li{margin-bottom:5px}
  .paper .secret-stamp{position:absolute;top:10px;right:12px;border:2px solid var(--hi);color:var(--hi);
    font-weight:800;font-size:13px;letter-spacing:.2em;padding:3px 8px;transform:rotate(8deg);opacity:.85}

  .test-box{border:2px solid var(--hi);border-radius:6px;padding:11px 13px;margin:10px 0;background:rgba(196,58,42,.06)}
  .test-box .tb-label{display:inline-block;background:var(--hi);color:#fff;font-size:11px;font-weight:700;letter-spacing:.2em;padding:2px 10px;border-radius:3px;margin-bottom:5px}
  .test-box .goro{font-size:13px;color:#8a4a2a;margin-top:5px}
  .test-box .goro:before{content:"♪ おぼえ方 ";font-weight:700}
  .deep-box{border:2px solid var(--ao);border-radius:6px;padding:11px 13px;margin:10px 0;background:rgba(91,127,199,.07)}
  .deep-box .db-label{display:inline-block;background:var(--ao);color:#fff;font-size:11px;font-weight:700;letter-spacing:.2em;padding:2px 10px;border-radius:3px;margin-bottom:5px}
  .deep-box .db-body{font-size:14px}

  /* ===== ビジュアルノベル画面 ===== */
  .vn-stage{
    position:relative;border:1px solid var(--line);border-radius:12px;overflow:hidden;
    background:radial-gradient(circle at 50% 42%, #3a2f24 0%, #241d17 55%, #171310 100%);
    min-height:430px;display:flex;flex-direction:column;
  }
  .vn-lines{position:absolute;inset:0;pointer-events:none;opacity:.5;
    background:repeating-conic-gradient(from 0deg at 50% 40%, rgba(242,232,213,.05) 0deg 2deg, transparent 2deg 7deg)}
  .vn-lines.hot{opacity:1;
    background:repeating-conic-gradient(from 0deg at 50% 40%, rgba(196,58,42,.16) 0deg 2deg, transparent 2deg 6deg)}
  .vn-portrait{flex:1;display:flex;align-items:flex-end;justify-content:center;position:relative;padding-top:14px;min-height:250px}
  .vn-portrait svg{filter:drop-shadow(0 6px 14px rgba(0,0,0,.5))}
  .vn-portrait.shake{animation:shake .35s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
  .vn-nameplate{position:absolute;left:0;bottom:118px;background:var(--hi);color:#fff;font-weight:700;
    padding:4px 16px 4px 12px;font-size:14px;letter-spacing:.1em;border-radius:0 4px 4px 0;z-index:3;
    box-shadow:2px 2px 8px rgba(0,0,0,.4)}
  .vn-nameplate.narr{background:#4a4238}
  .vn-textbox{position:relative;z-index:2;background:rgba(15,12,9,.92);border-top:2px solid var(--kin);
    min-height:118px;padding:16px 16px 14px;cursor:pointer}
  .vn-textbox .txt{font-size:16px;line-height:1.9;min-height:62px}
  .vn-next{position:absolute;right:14px;bottom:10px;color:var(--kin);font-size:13px;animation:blink 1s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
  .vn-prog{position:absolute;top:10px;right:12px;font-size:11px;color:var(--hai);z-index:3}
  .vn-skip{position:absolute;top:6px;left:10px;z-index:3}

  /* ツキツケ演出 */
  .fx-bg{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
    background:radial-gradient(circle, rgba(60,10,5,.85), rgba(20,5,3,.96));}
  .fx-bg .fx-lines{position:absolute;inset:0;
    background:repeating-conic-gradient(from 0deg at 50% 50%, rgba(255,240,200,.22) 0deg 2deg, transparent 2deg 5deg);
    animation:spin 9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .fx-item{font-size:84px;z-index:2;animation:slam .4s cubic-bezier(.2,2,.4,1) both;filter:drop-shadow(0 0 18px rgba(255,220,140,.8))}
  @keyframes slam{0%{transform:scale(4);opacity:0}60%{transform:scale(.9);opacity:1}100%{transform:scale(1)}}
  .fx-word{z-index:2;font-size:44px;font-weight:800;color:#fff;letter-spacing:.1em;margin-top:6px;
    text-shadow:0 0 12px var(--hi), 3px 3px 0 var(--hi);animation:slam .45s .1s cubic-bezier(.2,2,.4,1) both;
    transform:rotate(-6deg)}
  .fx-sub{z-index:2;color:#f0d9a0;font-size:13px;margin-top:14px;animation:blink 1.2s infinite}

  /* 入手・解放バナー */
  .get-banner{border:2px solid var(--kin);border-radius:8px;padding:11px 13px;margin:12px 0;background:rgba(212,169,78,.1);
    display:flex;align-items:center;gap:12px;cursor:pointer;animation:pop .3s cubic-bezier(.2,1.6,.4,1) both}
  @keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
  .get-banner .gicon{font-size:26px}
  .get-banner .gt{font-weight:700;font-size:14px}

  /* 絵地図 */
  .hud{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:8px;
    padding:9px 13px;margin-bottom:12px;background:var(--sumi2);font-size:13px}
  .hud .cnt{color:var(--kin);font-family:"Shippori Mincho",serif;font-size:17px}
  .mapwrap{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#e7dbbd}
  .map-pin{cursor:pointer}
  .map-pin:hover circle.pin-c{stroke:#8a2a1a}

  /* 場所・話題 */
  .spot{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:8px;background:var(--sumi2);
    padding:12px 14px;margin-bottom:9px;width:100%;text-align:left;color:var(--kinari);font-family:inherit;font-size:14.5px;cursor:pointer}
  .spot:hover{border-color:var(--kin)}
  .spot.done{border-color:var(--ok)}
  .spot .sicon{font-size:22px;flex:0 0 auto}
  .spot .check{margin-left:auto;color:var(--ok)}
  .topic{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:8px;background:var(--sumi2);
    padding:11px 13px;margin-bottom:8px;width:100%;text-align:left;color:var(--kinari);font-family:inherit;font-size:14.5px;cursor:pointer}
  .topic:hover{border-color:var(--kin)}
  .topic.done{border-color:var(--ok)}
  .topic.locked{opacity:.55;cursor:default}
  .topic .lockhint{font-size:11.5px;color:var(--hi);display:block}
  .topic.tsuki{border-color:var(--hi);background:rgba(196,58,42,.08)}
  .loc-head{display:flex;gap:12px;align-items:center;margin-bottom:8px}
  .loc-head .licon{font-size:38px}

  .inv-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
  .inv-tile{border:1px solid var(--line);border-radius:8px;background:var(--sumi2);padding:11px 6px;text-align:center;cursor:pointer;font-family:inherit;color:var(--kinari)}
  .inv-tile .icon{font-size:24px;display:block;margin-bottom:4px}
  .inv-tile .t{font-size:11px;line-height:1.4}
  .inv-tile.empty{opacity:.3;cursor:default}

  .q-num{font-size:12px;letter-spacing:.25em;color:var(--kin);margin-bottom:6px}
  .q-text{font-size:17px;font-weight:700;margin-bottom:14px;line-height:1.7}
  .choices{display:flex;flex-direction:column;gap:9px}
  .choice{border:1px solid var(--line);background:var(--sumi2);color:var(--kinari);border-radius:8px;
    padding:12px 14px;text-align:left;font-size:15px;cursor:pointer;font-family:inherit}
  .choice:hover{border-color:var(--kin)}
  .choice.correct{border-color:var(--ok);background:rgba(78,140,90,.15)}
  .choice.wrong{border-color:var(--hi);background:rgba(196,58,42,.12)}
  .fb{border-radius:8px;padding:11px 13px;margin-top:12px;font-size:14px}
  .fb.ok{background:rgba(78,140,90,.15);border:1px solid var(--ok)}
  .fb.ng{background:rgba(196,58,42,.12);border:1px solid var(--hi)}
  .score-bar{display:flex;justify-content:space-between;font-size:13px;color:var(--hai);margin-bottom:12px}
  .rank-big{font-size:44px;text-align:center;margin:8px 0;color:#8a4a2a}
  .adv-tag{display:inline-block;background:var(--ao);color:#fff;font-size:10px;font-weight:700;letter-spacing:.15em;padding:1px 8px;border-radius:3px;vertical-align:middle;margin-left:6px}

  .tl{border-left:2px solid var(--kin);padding-left:14px;margin-top:6px}
  .tl-row{margin-bottom:12px}
  .tl-row .yr{font-family:"Shippori Mincho",serif;font-size:18px;color:var(--kin)}
  .tl-row .ev{font-size:14.5px}
  .tl-row .gr{font-size:12px;color:var(--hai)}

  .modal-bg{position:fixed;inset:0;background:rgba(12,10,8,.94);display:flex;align-items:flex-start;justify-content:center;padding:16px;z-index:50;overflow-y:auto}
  .modal-card{max-width:460px;width:100%;margin:auto 0}

  @media(min-width:560px){
    .inv-grid{grid-template-columns:repeat(4,1fr)}
    body{font-size:16px}
    .vn-stage{min-height:470px}
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;animation:none !important} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState, useEffect, useRef} = React;

/* =====================================================
   歴史探偵事件簿・壱 「本能寺の変」 v3 ビジュアル版
   ===================================================== */
const APP_VERSION = "v3";

/* ---------- キャラクター立ち絵(SVG漫画風) ---------- */
const CHAR_CONF = {
  shino:    {name:"侍女・しの",   role:"本能寺の生き残り", skin:"#f5dcc0", kimono:"#7a6296", collar:"#e8dff0", hair:"#2e2438", style:"long"},
  froi:     {name:"フロイス",     role:"宣教師",           skin:"#f0d0b0", kimono:"#3a3a44", collar:"#d8d8dc", hair:"#6e5a44", style:"beard"},
  rikyu:    {name:"千利休",       role:"堺の商人・茶人",   skin:"#ecd2ae", kimono:"#4a4436", collar:"#cfc6ae", hair:"#5a5248", style:"monk"},
  akindo:   {name:"商人・与助",   role:"安土の商人",       skin:"#f0cfa6", kimono:"#8a6a2a", collar:"#e6d9b0", hair:"#3a2e20", style:"hachimaki"},
  hideyoshi:{name:"羽柴 秀吉",    role:"織田家の出世頭",   skin:"#e8c49a", kimono:"#b0342b", collar:"#f0e0c0", hair:"#2a2018", style:"topknot"},
  gonbe:    {name:"農民・権兵衛", role:"老ノ坂の村人",     skin:"#e0bc90", kimono:"#5a6242", collar:"#cfc6a0", hair:"#3a3026", style:"kasa"},
  mitsuhide:{name:"明智 光秀",    role:"織田家の重臣",     skin:"#f2dabb", kimono:"#3a4a6e", collar:"#dfe4ee", hair:"#241e18", style:"eboshi", crest:true},
  nobunaga: {name:"織田 信長",    role:"天下人まであと一歩",skin:"#eed2ac", kimono:"#6e1f1a", collar:"#e8d8b8", hair:"#241e18", style:"nobunaga"}
};

function Portrait({id, expr, size}){
  const c=CHAR_CONF[id]; if(!c) return null;
  const s=size||210;
  const e=expr||"normal";
  const eyes=()=>{
    if(e==="shock") return (<g>
      <circle cx="46" cy="52" r="7.5" fill="#fff" stroke="#222" strokeWidth="1.6"/>
      <circle cx="74" cy="52" r="7.5" fill="#fff" stroke="#222" strokeWidth="1.6"/>
      <circle cx="46" cy="52" r="2" fill="#222"/><circle cx="74" cy="52" r="2" fill="#222"/>
      <path d="M36,41 L54,44" stroke="#222" strokeWidth="2.4" fill="none"/>
      <path d="M84,41 L66,44" stroke="#222" strokeWidth="2.4" fill="none"/>
      <path d="M88,60 q4,7 0,12 q-5,-4 -2,-11 z" fill="#9ecfec" stroke="#5a9ec4" strokeWidth="1"/>
    </g>);
    if(e==="smile") return (<g>
      <path d="M40,52 q6,-7 12,0" stroke="#222" strokeWidth="2.4" fill="none"/>
      <path d="M68,52 q6,-7 12,0" stroke="#222" strokeWidth="2.4" fill="none"/>
    </g>);
    if(e==="angry") return (<g>
      <circle cx="46" cy="53" r="3.4" fill="#222"/><circle cx="74" cy="53" r="3.4" fill="#222"/>
      <path d="M36,42 L56,48" stroke="#222" strokeWidth="2.6" fill="none"/>
      <path d="M84,42 L64,48" stroke="#222" strokeWidth="2.6" fill="none"/>
    </g>);
    if(e==="sad") return (<g>
      <circle cx="46" cy="53" r="3" fill="#222"/><circle cx="74" cy="53" r="3" fill="#222"/>
      <path d="M38,46 L54,42" stroke="#222" strokeWidth="2.2" fill="none"/>
      <path d="M82,46 L66,42" stroke="#222" strokeWidth="2.2" fill="none"/>
    </g>);
    return (<g>
      <circle cx="46" cy="52" r="3.4" fill="#222"/><circle cx="74" cy="52" r="3.4" fill="#222"/>
      <path d="M38,44 L54,44" stroke="#222" strokeWidth="2.2" fill="none"/>
      <path d="M82,44 L66,44" stroke="#222" strokeWidth="2.2" fill="none"/>
    </g>);
  };
  const mouth=()=>{
    if(e==="shock") return <ellipse cx="60" cy="72" rx="6" ry="7" fill="#5a2a22"/>;
    if(e==="smile") return <path d="M50,70 q10,9 20,0" stroke="#5a2a22" strokeWidth="2.6" fill="none"/>;
    if(e==="angry") return <path d="M50,74 q10,-6 20,0" stroke="#5a2a22" strokeWidth="2.6" fill="none"/>;
    if(e==="sad")   return <path d="M52,74 q8,-5 16,0" stroke="#5a2a22" strokeWidth="2.4" fill="none"/>;
    return <path d="M52,71 L68,71" stroke="#5a2a22" strokeWidth="2.4" fill="none"/>;
  };
  const hairAndHat=()=>{
    switch(c.style){
      case "long": return (<g>
        <path d="M28,54 q-4,-38 32,-38 q36,0 32,38 q0,-24 -12,-28 q4,10 -2,12 q-6,-14 -18,-14 q-12,0 -18,14 q-6,-2 -2,-12 q-12,4 -12,28 z" fill={c.hair}/>
        <path d="M28,50 q-6,26 -4,44 l12,0 q-4,-20 -2,-36 z" fill={c.hair}/>
        <path d="M92,50 q6,26 4,44 l-12,0 q4,-20 2,-36 z" fill={c.hair}/>
      </g>);
      case "beard": return (<g>
        <path d="M32,40 q-2,-24 28,-24 q30,0 28,24 q-8,-14 -28,-14 q-20,0 -28,14 z" fill={c.hair}/>
        <path d="M40,76 q20,18 40,0 q-2,16 -20,16 q-18,0 -20,-16 z" fill={c.hair} opacity=".9"/>
        <rect x="55" y="96" width="10" height="14" rx="2" fill="#c8a04e"/>
        <rect x="51" y="100" width="18" height="5" rx="2" fill="#c8a04e"/>
      </g>);
      case "monk": return (<g>
        <path d="M34,38 q4,-16 26,-16 q22,0 26,16 q-10,-8 -26,-8 q-16,0 -26,8 z" fill={c.hair} opacity=".5"/>
        <path d="M42,80 q18,14 36,0 q-2,12 -18,12 q-16,0 -18,-12 z" fill="#8a8276"/>
      </g>);
      case "hachimaki": return (<g>
        <path d="M30,46 q0,-28 30,-28 q30,0 30,28 q-10,-16 -30,-16 q-20,0 -30,16 z" fill={c.hair}/>
        <rect x="28" y="34" width="64" height="9" rx="4" fill="#e8e0cc" stroke="#b0a684" strokeWidth="1"/>
      </g>);
      case "topknot": return (<g>
        <path d="M32,44 q0,-26 28,-26 q28,0 28,26 q-10,-15 -28,-15 q-18,0 -28,15 z" fill={c.hair}/>
        <path d="M54,16 q6,-8 12,0 l-3,8 l-6,0 z" fill={c.hair}/>
        <path d="M44,64 q4,4 8,0" stroke="#5a3a22" strokeWidth="1.6" fill="none"/>
        <path d="M68,64 q4,4 8,0" stroke="#5a3a22" strokeWidth="1.6" fill="none"/>
      </g>);
      case "kasa": return (<g>
        <path d="M14,40 L60,6 L106,40 Z" fill="#c8b478" stroke="#9a8a54" strokeWidth="1.5"/>
        <path d="M40,88 q4,6 8,4 M72,88 q-4,6 -8,4" stroke={c.hair} strokeWidth="2" fill="none"/>
      </g>);
      case "eboshi": return (<g>
        <path d="M34,42 q0,-24 26,-24 q26,0 26,24 q-8,-14 -26,-14 q-18,0 -26,14 z" fill={c.hair}/>
        <path d="M44,20 q4,-22 26,-18 q8,2 6,14 q-2,10 -14,10 q-14,0 -18,-6 z" fill="#1a1512" stroke="#000" strokeWidth="1"/>
      </g>);
      case "nobunaga": return (<g>
        <path d="M32,42 q0,-26 28,-26 q28,0 28,26 q-10,-16 -28,-16 q-18,0 -28,16 z" fill={c.hair}/>
        <path d="M52,14 q8,-10 16,0 l-4,9 l-8,0 z" fill={c.hair}/>
        <path d="M44,64 q6,5 12,2 M76,64 q-6,5 -12,2" stroke="#241e18" strokeWidth="2" fill="none"/>
        <path d="M52,80 q8,7 16,0 l-2,7 q-6,4 -12,0 z" fill="#241e18" opacity=".8"/>
      </g>);
      default: return null;
    }
  };
  return (

/* ---------- 会話エンジン(逆転裁判風) ---------- */
function Dialogue({script, fxItem, onEnd}){
  const [idx,setIdx]=useState(0);
  const [chars,setChars]=useState(0);
  const [fxDone,setFxDone]=useState(!fxItem);
  const line=script[idx];
  const full=line.t;
  const typing = chars < full.length;

  useEffect(()=>{
    if(!fxDone) return;
    setChars(0);
    const iv=setInterval(()=>{
      setChars(c=>{
        if(c>=full.length){clearInterval(iv); return c;}
        return c+1;
      });
    }, 28);
    return ()=>clearInterval(iv);
  },[idx, fxDone]);

  const tap=()=>{
    if(typing){ setChars(full.length); return; }
    if(idx+1<script.length) setIdx(idx+1);
    else onEnd();
  };

  const isShock = line.e==="shock" || line.e==="angry";
  if(!fxDone){
    const it=ITEMS[fxItem];
    return (
      <div className="vn-stage" onClick={()=>setFxDone(true)}>
        <div className="fx-bg">
          <div className="fx-lines"/>
          <div className="fx-item">{it.icon}</div>
          <div className="fx-word mincho">ツキツケル!!</div>
          <div className="fx-sub">▼ タップ ── 「{it.name}」をつきつけた!</div>
        </div>
      </div>
    );
  }
  return (
    <div className="vn-stage">
      <div className={"vn-lines"+(isShock?" hot":"")}/>
      <div className="vn-prog">{idx+1}/{script.length}</div>
      <div className={"vn-portrait"+(isShock && chars<3 ? " shake":"")} key={idx}>
        {line.sp && <Portrait id={line.sp} expr={line.e}/>}
        {!line.sp && <div style={{fontSize:64, opacity:.5, paddingBottom:30}}>📔</div>}
      </div>
      <div className={"vn-nameplate mincho"+(line.sp?"":" narr")}>
        {line.sp? CHAR_CONF[line.sp].name : "探偵メモ"}
      </div>
      <div className="vn-textbox" onClick={tap}>
        <div className="txt">{full.slice(0,chars)}</div>
        {!typing && <div className="vn-next">▼ タップ</div>}
      </div>
    </div>
  );
}

    </div>
  );
}

/* ---------- 場所 ---------- */
function LocationScreen({loc, go, items, addItem, spotsDone, markSpot, openItem}){
  const [view,setView]=useState(null);
  const person = loc.person? CHAR_CONF[loc.person] : null;
  return (
    <div>
      <TopBar onBack={()=>go("map")} label="← 絵図へ"/>
      <div className="loc-head">
        <span className="licon">{loc.icon}</span>
        <div>
          <div className="eyebrow" style={{marginBottom:0}}>{loc.area}</div>
          <h2 className="mincho" style={{fontSize:22}}>{loc.name}</h2>
        </div>
      </div>
      <p style={{color:"var(--hai)", fontSize:14, margin:"4px 0 14px"}}>{loc.desc}</p>

      {loc.spots.length>0 && <div className="eyebrow">調べる</div>}
      {loc.spots.map(sp=>{
        const done = spotsDone[loc.id+":"+sp.id];
        return (
          <button key={sp.id} className={"spot"+(done?" done":"")} onClick={()=>{
            setView(sp);
            if(sp.gives) addItem(sp.gives);
            markSpot(loc.id, sp.id);
          }}>
            <span className="sicon">{sp.icon}</span>{sp.label}
            {done && <span className="check">✓</span>}
          </button>
        );
      })}

      {person && (
        <div style={{marginTop:12}}>
          <div className="eyebrow">話を聞く</div>
          <button className="spot" onClick={()=>go("talk", loc.person)}>
            <span style={{marginLeft:-6, marginRight:2, flex:"0 0 auto"}}><Portrait id={loc.person} expr="normal" size={46}/></span>
            {person.name}({person.role})と話す
          </button>
        </div>
      )}

      {view && (
        <div className="modal-bg" onClick={()=>setView(null)}>
          <div className="modal-card paper" onClick={e=>e.stopPropagation()}>
            <div className="meta">調査記録</div>
            <h3 className="mincho">{view.icon} {view.label}</h3>
            {view.lines.map((t,i)=><P key={i}>{t}</P>)}
            {view.gives && (
              <div className="get-banner" style={{borderColor:"#8a6a2a", background:"rgba(138,106,42,.08)"}}
                onClick={()=>{setView(null); openItem(view.gives);}}>
                <span className="gicon">{ITEMS[view.gives].icon}</span>
                <span className="gt" style={{color:"#6a4a1a"}}>証拠入手!「{ITEMS[view.gives].name}」(タップで詳細)</span>
              </div>
            )}
            <button className="btn primary block" onClick={()=>setView(null)}>とじる</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- 会話画面 ---------- */
function TalkScreen({personId, backLocId, go, items, addItem, talked, markTalk, openItem, setConfessed}){
  const conf=CHAR_CONF[personId];
  const data=PEOPLE[personId];
  const [mode,setMode]=useState("intro");   // intro / topics / dialog / after
  const [topic,setTopic]=useState(null);
  const has=id=>!!items[id];

  if(mode==="intro"){
    return (
      <div>
        <TopBar onBack={()=>go("loc", backLocId)} label="← 場所へ"/>
        <Dialogue script={data.intro} onEnd={()=>setMode("topics")}/>
      </div>
    );
  }
  if(mode==="dialog" && topic){
    return (
      <div>
        <TopBar onBack={()=>setMode("topics")} label="← 質問一覧へ"/>
        <Dialogue script={topic.script} fxItem={topic.fx} onEnd={()=>setMode("after")}/>
      </div>
    );
  }
  if(mode==="after" && topic){
    return (
      <div>
        <TopBar onBack={()=>go("loc", backLocId)} label="場所へ"/>
        <div className="eyebrow">{topic.label} ── 記録</div>
        {topic.gives && (
          <div className="get-banner" onClick={()=>openItem(topic.gives)}>
            <span className="gicon">{ITEMS[topic.gives].icon}</span>
            <span className="gt">証拠入手!「{ITEMS[topic.gives].name}」(タップで詳細)</span>
          </div>
        )}
        {topic.confess && (
          <div className="get-banner" style={{borderColor:"var(--hi)", background:"rgba(196,58,42,.1)"}}>
            <span className="gicon">⚖️</span>
            <span className="gt">捜査完了! 絵図の【推理】が解放された</span>
          </div>
        )}
        {topic.deep && <DeepBox title={topic.deep.title} body={topic.deep.body}/>}
        <button className="btn primary block" onClick={()=>setMode("topics")}>質問一覧へもどる</button>
      </div>
    );
  }
  return (
    <div>
      <TopBar onBack={()=>go("loc", backLocId)} label="← 場所へ"/>
      <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:8}}>
        <Portrait id={personId} expr="normal" size={78}/>
        <div>
          <div className="eyebrow" style={{marginBottom:2}}>{conf.role}</div>
          <div className="mincho" style={{fontSize:20, fontWeight:700}}>{conf.name}</div>
        </div>
      </div>
      <div className="eyebrow">質問する</div>
      {data.topics.map(tp=>{
        const locked = tp.needs && !tp.needs.every(has);
        const done = talked[personId+":"+tp.id];
        return (
          <button key={tp.id}
            className={"topic"+(locked?" locked":"")+(done?" done":"")+(tp.fx&&!locked?" tsuki":"")}
            onClick={()=>{
              if(locked) return;
              if(tp.gives) addItem(tp.gives);
              if(tp.confess) setConfessed(true);
              markTalk(personId, tp.id);
              setTopic(tp); setMode("dialog");
            }}>
            <span>{done?"✓ ":""}{tp.fx?"⚡ ":""}{tp.label}
              {locked && <span className="lockhint">🔒 必要な証拠: {tp.needs.map(n=>ITEMS[n].name).join("、")}</span>}
            </span>
          </button>
        );
      })}
    </div>
  );
}

/* ---------- バッグ&アイテム ---------- */
function InventoryModal({items, close, openItem}){
  return (
    <div className="modal-bg" onClick={close}>
      <div className="modal-card" onClick={e=>e.stopPropagation()}>
        <div className="eyebrow">捜査バッグ({ITEM_ORDER.filter(i=>items[i]).length}/11)</div>
        <div className="inv-grid">
          {ITEM_ORDER.map(id=>{
            const got=items[id];
            return (
              <button key={id} className={"inv-tile"+(got?"":" empty")} onClick={()=>{ if(got) openItem(id); }}>
                <span className="icon">{got? ITEMS[id].icon:"❓"}</span>
                <span className="t">{got? ITEMS[id].name:"未発見"}</span>
              </button>
            );
          })}
        </div>
        <button className="btn block" style={{marginTop:12}} onClick={close}>とじる</button>
      </div>
    </div>
  );
}
function ItemModal({itemId, close}){
  const it=ITEMS[itemId];
  return (
    <div className="modal-bg" onClick={close}>
      <div className="modal-card paper" onClick={e=>e.stopPropagation()}>
        <div className="secret-stamp mincho">証拠</div>
        <div className="meta">押収品調書</div>
        <h3 className="mincho">{it.icon} {it.name}</h3>
        <TestBox fact={it.basic} goro={it.goro}/>
        {it.deep && <DeepBox body={it.deep}/>}
        <button className="btn primary block" onClick={close}>記録した</button>
      </div>
    </div>
  );
}

/* ---------- 推理 ---------- */
function Deduction({go}){
  const [idx,setIdx]=useState(0);
  const [picked,setPicked]=useState(null);
  const q=DEDUCTION[idx];
  const correct=picked===q.a;
  return (
    <div>
      <TopBar onBack={()=>go("map")} label="← 絵図へ"/>
      <div className="eyebrow">最終章 ── 推理</div>
      <div style={{display:"flex", justifyContent:"center", marginBottom:6}}>
        <Portrait id="mitsuhide" expr={picked===null? "normal" : (correct? "shock":"normal")} size={110}/>
      </div>
      <div className="q-num mincho">{idx+1} / {DEDUCTION.length}</div>
      <div className="q-text">{q.q}</div>
      <div className="choices">
        {q.c.map((c,i)=>(
          <button key={i} className={"choice"+(picked===null?"":(i===q.a?" correct":(i===picked?" wrong":"")))}
            onClick={()=>{ if(picked===null) setPicked(i); }}>{c}</button>
        ))}
      </div>
      {picked!==null && (
        <div>
          <div className={"fb "+(correct?"ok":"ng")}>{correct? q.ok : q.ng}</div>
          <div style={{marginTop:12}}>
            {correct
              ? <button className="btn primary block" onClick={()=>{ if(idx+1<DEDUCTION.length){setIdx(idx+1);setPicked(null);} else go("truth"); }}>
                  {idx+1<DEDUCTION.length? "次の推理へ":"真相を開く"}</button>
              : <button className="btn block" onClick={()=>setPicked(null)}>もう一度考える</button>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- 真相 ---------- */
function Truth({go}){
  return (
    <div>
      <TopBar onBack={()=>go("map")} label="絵図へ"/>
      <div className="eyebrow">解決 ── 真相</div>
      <div style={{display:"flex", justifyContent:"center", gap:8, marginBottom:6}}>
        <Portrait id="mitsuhide" expr="sad" size={110}/>
        <Portrait id="nobunaga" expr="normal" size={110}/>
      </div>
      <div className="paper">
        <div className="secret-stamp mincho">解決</div>
        <div className="meta">事件簿 結び</div>
        <h3 className="mincho">「敵は本能寺にあり」</h3>
        {TRUTH.map((t,i)=><P key={i}>{t}</P>)}
      </div>
      <div className="paper">
        <div className="meta">歴史のナゾ ── 君はどの説?</div>
        <h3 className="mincho">日本史最大のミステリー</h3>
        <ul>{SETSU.map((s,i)=><li key={i}><b>{s.t}</b> ── {s.d}</li>)}</ul>
      </div>
      <div className="eyebrow" style={{marginTop:18}}>そして歴史は動く</div>
      <div className="tl">
        {EPILOGUE.map((e,i)=>(
          <div key={i} className="tl-row">
            <div className="yr mincho">{e.yr} {e.t}</div>
            <div className="ev" style={{fontSize:14, color:"#d8d2c2"}}>{e.d}</div>
          </div>
        ))}
      </div>
      <button className="btn primary block" onClick={()=>go("dojo")}>一問一答道場で腕試し(全20問)</button>
      <div style={{height:10}}/>
      <button className="btn block" onClick={()=>go("timeline")}>年表で復習する</button>
    </div>
  );
}

/* ---------- 道場 ---------- */
function Dojo({go}){
  const [idx,setIdx]=useState(0);
  const [picked,setPicked]=useState(null);
  const [score,setScore]=useState(0);
  const [fin,setFin]=useState(false);
  const total=QUIZ.length;

  if(fin){
    const rank=RANKS.find(r=>score>=r.min);
    return (
      <div>
        <TopBar onBack={()=>go("cover")} label="表紙へ"/>
        <div className="eyebrow">道場 ── 結果発表</div>
        <div className="paper" style={{textAlign:"center"}}>
          <div className="meta">認定証</div>
          <p style={{marginBottom:0}}>{total}問中 <b style={{fontSize:24}}>{score}</b> 問正解</p>
          <div className="rank-big mincho">{rank.name}</div>
          <P>{rank.msg}</P>
        </div>
        <button className="btn primary block" onClick={()=>{setIdx(0);setPicked(null);setScore(0);setFin(false);}}>もう一周する</button>
        <div style={{height:10}}/>
        <button className="btn block" onClick={()=>go("timeline")}>年表で復習する</button>
      </div>
    );
  }
  const q=QUIZ[idx];
  const correct=picked===q.a;
  return (
    <div>
      <TopBar onBack={()=>go("cover")} label="表紙へ"/>
      <div className="eyebrow">一問一答道場</div>
      <div className="score-bar">
        <span className="mincho">第 {idx+1} 問 / {total}</span>
        <span>正解 {score}</span>
      </div>
      <div className="q-text">{q.q}{q.adv && <span className="adv-tag">発展</span>}</div>
      <div className="choices">
        {q.c.map((c,i)=>(
          <button key={i} className={"choice"+(picked===null?"":(i===q.a?" correct":(i===picked?" wrong":"")))}
            onClick={()=>{ if(picked===null){setPicked(i); if(i===q.a) setScore(s=>s+1);} }}>{c}</button>
        ))}
      </div>
      {picked!==null && (
        <div>
          <div className={"fb "+(correct?"ok":"ng")}>
            <b>{correct?"正解!":"ざんねん!"}</b> {q.ex}
            <div style={{fontSize:13, marginTop:4, opacity:.85}}>♪ {q.goro}</div>
          </div>
          <div style={{marginTop:12}}>
            <button className="btn primary block" onClick={()=>{
              if(idx+1<total){setIdx(idx+1);setPicked(null);} else setFin(true);
            }}>{idx+1<total?"次の問題へ":"結果を見る"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- 年表 ---------- */
function Timeline({go}){
  return (
    <div>
      <TopBar onBack={()=>go("cover")} label="表紙へ"/>
      <div className="eyebrow">戦国年表 ── これだけは書けるように</div>
      <div className="tl">
        {TIMELINE.map((t,i)=>(
          <div key={i} className="tl-row">
            <div className="yr mincho">{t.yr}</div>
            <div className="ev">{t.ev}</div>
            <div className="gr">{t.gr}</div>
          </div>
        ))}
      </div>
      <button className="btn primary block" onClick={()=>go("dojo")}>この年表で道場に挑む</button>
    </div>
  );
}

/* ---------- 先生用ガイド ---------- */
function Guide({go}){
  return (
    <div>
      <TopBar onBack={()=>go("cover")} label="表紙へ"/>
      <div className="eyebrow">先生用ガイド(v3 ビジュアル版)</div>
      <div className="paper">
        <div className="meta">授業で使う場合(20〜30分)</div>
        <h3 className="mincho">授業パターン ── ペア探偵</h3>
        <ul>
          <li>導入3分:開幕ムービー(タップ送り)をみんなで見て「犯人はだれ?」と予想させてから探索へ。</li>
          <li>探索15分:2人1組の「ペア探偵」。証拠を1つ入手するたびに、相方に赤枠の内容を自分の言葉で説明。説明できたら記録用紙に◯、あやしければ△。</li>
          <li>探索順は自由。「どこから調べる?」は生徒に決めさせてください。自分で選ぶと集中が生まれます。</li>
          <li>クライマックス:光秀への「つきつけ」演出はぜひ画面を見せ合って盛り上がってください。青枠の発展は余裕のある生徒・上位校志望向け。</li>
          <li>チェック:道場20問(基本15+発展5)。基本15問の8割(12問)を合格ラインの目安に、△✕は解説と語呂を読み直してその場で解き直し。</li>
        </ul>
      </div>
      <div className="paper">
        <div className="meta">自習・宿題で使う場合</div>
        <h3 className="mincho">生徒ひとりでやるパターン</h3>
        <ul>
          <li>1周目:絵図を自由に探索して証拠11個をコンプリート(約20分)。</li>
          <li>2周目:道場20問→まちがえた問題の解説と語呂を音読→もう1周。</li>
          <li>仕上げ:年表を紙に書き出せたら合格。発展まで全問正解で「天下人」!</li>
          <li>テスト前は「年表→道場」で1セット10分の復習に。</li>
        </ul>
      </div>
      <button className="btn block" onClick={()=>go("cover")}>表紙へもどる</button>
    </div>
  );
}

/* ---------- App ---------- */
function App(){
  const [screen,setScreen]=useState("cover");
  const [locId,setLocId]=useState(null);
  const [personId,setPersonId]=useState(null);
  const [items,setItems]=useState({});
  const [talked,setTalked]=useState({});
  const [spotsDone,setSpotsDone]=useState({});
  const [confessed,setConfessed]=useState(false);
  const [invOpen,setInvOpen]=useState(false);
  const [itemModal,setItemModal]=useState(null);

  const go=(s, arg)=>{
    if(s==="loc") setLocId(arg);
    if(s==="talk") setPersonId(arg);
    setScreen(s); window.scrollTo(0,0);
  };
  const addItem=id=>setItems(v=>({...v,[id]:true}));
  const markTalk=(p,t)=>setTalked(v=>({...v,[p+":"+t]:true}));
  const markSpot=(l,s)=>setSpotsDone(v=>({...v,[l+":"+s]:true}));
  const locDone=L=>{
    const spotsOk=L.spots.every(sp=>spotsDone[L.id+":"+sp.id]);
    const personOk=!L.person || PEOPLE[L.person].topics.every(tp=>talked[L.person+":"+tp.id] || (tp.needs && !tp.needs.every(n=>items[n])));
    return spotsOk && personOk && (L.spots.length>0 || L.person);
  };
  const loc=LOCATIONS.find(l=>l.id===locId);

  return (
    <div>
      {screen==="cover" && <Cover go={go}/>}
      {screen==="opening" && <Opening go={go}/>}
      {screen==="map" && <MapScreen go={go} items={items} confessed={confessed} openInv={()=>setInvOpen(true)} locDone={locDone}/>}
      {screen==="loc" && loc && <LocationScreen loc={loc} go={go} items={items} addItem={addItem} spotsDone={spotsDone} markSpot={markSpot} openItem={id=>setItemModal(id)}/>}
      {screen==="talk" && personId && <TalkScreen personId={personId} backLocId={locId} go={go} items={items} addItem={addItem} talked={talked} markTalk={markTalk} openItem={id=>setItemModal(id)} setConfessed={setConfessed}/>}
      {screen==="deduction" && <Deduction go={go}/>}
      {screen==="truth" && <Truth go={go}/>}
      {screen==="dojo" && <Dojo go={go}/>}
      {screen==="timeline" && <Timeline go={go}/>}
      {screen==="guide" && <Guide go={go}/>}
      {invOpen && <InventoryModal items={items} close={()=>setInvOpen(false)} openItem={id=>{setInvOpen(false); setItemModal(id);}}/>}
      {itemModal && <ItemModal itemId={itemModal} close={()=>setItemModal(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
