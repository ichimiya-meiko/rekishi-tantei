<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>歴史探偵事件簿・壱 本能寺の変 v2 | 戦国探索アドベンチャー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --sumi:#171310;
    --sumi2:#241d17;
    --kin:#d4a94e;
    --hi:#c43a2a;
    --kinari:#f2e8d5;
    --hai:#9a9184;
    --line:rgba(212,169,78,.35);
    --ok:#4e8c5a;
    --ao:#5b8fc7;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--sumi);
    background-image:
      radial-gradient(900px 500px at 85% -5%, rgba(212,169,78,.09), transparent 60%),
      radial-gradient(700px 500px at -5% 105%, rgba(196,58,42,.08), transparent 60%);
    color:var(--kinari);
    font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",sans-serif;
    line-height:1.8;font-size:15px;
  }
  #root{max-width:760px;margin:0 auto;min-height:100%;padding:0 16px 72px}
  .mincho{font-family:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 2px;border-bottom:1px solid var(--line);margin-bottom:16px;gap:8px}
  .topbar .brand{font-size:13px;letter-spacing:.25em;color:var(--kin);white-space:nowrap}
  .backlink{background:none;border:none;color:var(--hai);font-size:13px;cursor:pointer;padding:6px 0;letter-spacing:.1em;font-family:inherit;white-space:nowrap}

  .btn{display:inline-block;border:1px solid var(--line);background:var(--sumi2);color:var(--kinari);
    padding:12px 18px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:15px;letter-spacing:.06em;transition:transform .08s}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--hi);border-color:transparent;color:#fff;font-weight:700}
  .btn.gold{background:transparent;border-color:var(--kin);color:var(--kin)}
  .btn.small{padding:7px 12px;font-size:13px}
  .btn.block{display:block;width:100%;text-align:center}
  .btn:disabled{opacity:.4;cursor:default}
  .eyebrow{font-size:11px;letter-spacing:.4em;color:var(--kin);margin-bottom:8px}
  .note{font-size:12.5px;color:var(--hai)}

  .cover{padding-top:6vh;text-align:center}
  .cover .case-no{font-size:11px;letter-spacing:.5em;color:var(--hai)}
  .title-wrap{position:relative;display:inline-block;margin:24px auto 8px}
  .v-title{writing-mode:vertical-rl;font-size:40px;font-weight:800;letter-spacing:.16em;line-height:1.5;
    height:300px;text-shadow:0 2px 12px rgba(0,0,0,.6)}
  .v-sub{writing-mode:vertical-rl;font-size:13px;letter-spacing:.4em;color:var(--kin);height:260px;
    display:inline-block;margin-right:24px;vertical-align:top;padding-top:10px}
  .stamp{position:absolute;right:-56px;top:-4px;width:72px;height:72px;border:3px solid var(--hi);border-radius:50%;
    color:var(--hi);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;
    transform:rotate(12deg);opacity:.92}
  .cover .lead{max-width:480px;margin:18px auto 28px;color:var(--hai);font-size:13.5px}
  .cover .menu{display:flex;flex-direction:column;gap:12px;max-width:340px;margin:0 auto}

  .paper{background:var(--kinari);color:#2b2317;border-radius:4px;padding:22px 20px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);position:relative;overflow:hidden;margin-bottom:14px}
  .paper:before{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(120,90,40,.045) 0 2px, transparent 2px 5px)}
  .paper h3{font-size:17px;margin-bottom:10px;letter-spacing:.08em}
  .paper .meta{font-size:12px;color:#8a7a58;letter-spacing:.2em;margin-bottom:6px}
  .paper p{margin-bottom:10px}
  .paper ul{padding-left:1.2em;margin-bottom:10px}
  .paper li{margin-bottom:6px}
  .paper .secret-stamp{position:absolute;top:10px;right:12px;border:2px solid var(--hi);color:var(--hi);
    font-weight:800;font-size:13px;letter-spacing:.2em;padding:3px 8px;transform:rotate(8deg);opacity:.85}

  .test-box{border:2px solid var(--hi);border-radius:6px;padding:12px 14px;margin:12px 0;background:rgba(196,58,42,.06)}
  .test-box .tb-label{display:inline-block;background:var(--hi);color:#fff;font-size:11px;font-weight:700;
    letter-spacing:.2em;padding:2px 10px;border-radius:3px;margin-bottom:6px}
  .test-box .goro{font-size:13px;color:#8a4a2a;margin-top:6px}
  .test-box .goro:before{content:"♪ おぼえ方 ";font-weight:700}
  .deep-box{border:2px solid #5b7fc7;border-radius:6px;padding:12px 14px;margin:12px 0;background:rgba(91,127,199,.07)}
  .deep-box .db-label{display:inline-block;background:#5b7fc7;color:#fff;font-size:11px;font-weight:700;
    letter-spacing:.2em;padding:2px 10px;border-radius:3px;margin-bottom:6px}
  .deep-box .db-body{font-size:14px}

  /* マップ */
  .hud{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:8px;
    padding:10px 14px;margin-bottom:14px;background:var(--sumi2);font-size:13px}
  .hud .cnt{color:var(--kin);font-family:"Shippori Mincho",serif;font-size:17px}
  .map-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .map-card{border:1px solid var(--line);border-radius:10px;background:var(--sumi2);padding:16px 10px;text-align:center;
    cursor:pointer;font-family:inherit;color:var(--kinari);transition:border-color .15s;position:relative}
  .map-card:hover{border-color:var(--kin)}
  .map-card .icon{font-size:30px;display:block;margin-bottom:6px}
  .map-card .nm{font-size:14px;font-weight:700;letter-spacing:.04em}
  .map-card .st{font-size:11px;color:var(--hai);margin-top:2px}
  .map-card.clear{border-color:var(--ok)}
  .map-card.locked{opacity:.55}
  .map-card .badge{position:absolute;top:8px;right:8px;font-size:11px;color:var(--ok)}

  /* 探索スポット */
  .spot{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:8px;background:var(--sumi2);
    padding:13px 14px;margin-bottom:10px;width:100%;text-align:left;color:var(--kinari);font-family:inherit;font-size:14.5px;cursor:pointer}
  .spot:hover{border-color:var(--kin)}
  .spot.done{border-color:var(--ok)}
  .spot .sicon{font-size:22px;flex:0 0 auto}
  .spot .check{margin-left:auto;color:var(--ok)}

  /* 会話 */
  .person-head{display:flex;gap:14px;align-items:center;margin-bottom:12px}
  .person-mon{flex:0 0 56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:800;border:2px solid var(--line)}
  .person-head .nm{font-size:19px;font-weight:700}
  .person-head .rl{font-size:12px;color:var(--kin);letter-spacing:.1em}
  .topic{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:8px;background:var(--sumi2);
    padding:12px 14px;margin-bottom:9px;width:100%;text-align:left;color:var(--kinari);font-family:inherit;font-size:14.5px;cursor:pointer}
  .topic:hover{border-color:var(--kin)}
  .topic.done{border-color:var(--ok)}
  .topic.locked{opacity:.55;cursor:default}
  .topic .lockhint{font-size:11.5px;color:var(--hi);display:block}
  .serif-line{border-left:3px solid var(--kin);padding:6px 12px;margin:10px 0;font-size:15px;background:rgba(212,169,78,.05);border-radius:0 6px 6px 0}
  .get-banner{border:2px solid var(--kin);border-radius:8px;padding:12px 14px;margin:14px 0;background:rgba(212,169,78,.1);
    display:flex;align-items:center;gap:12px;cursor:pointer}
  .get-banner .gicon{font-size:26px}
  .get-banner .gt{font-weight:700}

  /* バッグ */
  .inv-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
  .inv-tile{border:1px solid var(--line);border-radius:8px;background:var(--sumi2);padding:12px 6px;text-align:center;
    cursor:pointer;font-family:inherit;color:var(--kinari)}
  .inv-tile .icon{font-size:24px;display:block;margin-bottom:4px}
  .inv-tile .t{font-size:11px;line-height:1.4}
  .inv-tile.empty{opacity:.3;cursor:default}

  /* クイズ */
  .q-num{font-size:12px;letter-spacing:.25em;color:var(--kin);margin-bottom:6px}
  .q-text{font-size:17px;font-weight:700;margin-bottom:16px;line-height:1.7}
  .choices{display:flex;flex-direction:column;gap:10px}
  .choice{border:1px solid var(--line);background:var(--sumi2);color:var(--kinari);border-radius:8px;
    padding:13px 14px;text-align:left;font-size:15px;cursor:pointer;font-family:inherit}
  .choice:hover{border-color:var(--kin)}
  .choice.correct{border-color:var(--ok);background:rgba(78,140,90,.15)}
  .choice.wrong{border-color:var(--hi);background:rgba(196,58,42,.12)}
  .fb{border-radius:8px;padding:12px 14px;margin-top:14px;font-size:14px}
  .fb.ok{background:rgba(78,140,90,.15);border:1px solid var(--ok)}
  .fb.ng{background:rgba(196,58,42,.12);border:1px solid var(--hi)}
  .score-bar{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--hai);margin-bottom:14px}
  .rank-big{font-size:44px;letter-spacing:.1em;text-align:center;margin:10px 0;color:#8a4a2a}
  .adv-tag{display:inline-block;background:#5b7fc7;color:#fff;font-size:10px;font-weight:700;letter-spacing:.15em;
    padding:1px 8px;border-radius:3px;vertical-align:middle;margin-left:6px}

  .tl{border-left:2px solid var(--kin);padding-left:14px;margin-top:6px}
  .tl-row{margin-bottom:14px}
  .tl-row .yr{font-family:"Shippori Mincho",serif;font-size:19px;color:var(--kin);letter-spacing:.08em}
  .tl-row .ev{font-size:14.5px}
  .tl-row .gr{font-size:12px;color:var(--hai)}

  .modal-bg{position:fixed;inset:0;background:rgba(12,10,8,.94);display:flex;align-items:flex-start;justify-content:center;padding:18px;z-index:50;overflow-y:auto}
  .modal-card{max-width:460px;width:100%;margin:auto 0}

  @media(min-width:560px){
    .map-grid{grid-template-columns:1fr 1fr 1fr}
    .inv-grid{grid-template-columns:repeat(4,1fr)}
    body{font-size:16px}
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState} = React;

/* =====================================================
   歴史探偵事件簿・壱 「本能寺の変」 v2 探索アドベンチャー版
   ===================================================== */
const APP_VERSION = "v2";

/* ---------- アイテム(証拠) ---------- */
const ITEMS = {
  teppo:{icon:"🔫", name:"焼けた鉄砲",
    basic:"鉄砲は1543年、ポルトガル人を乗せた船が種子島(たねがしま・鹿児島県)に流れ着いて伝わった。その後、堺(大阪府)や国友(滋賀県)で大量生産された。",
    goro:"以後よさん(1543)そろえて鉄砲買おう",
    deep:"有名な長篠の戦い(1575)の「三千丁の鉄砲・三段撃ち」は、実は当時の史料には書かれておらず、後の時代の創作の可能性が指摘されている。ただし「大量の鉄砲を組織的に使って騎馬隊を破った」こと自体は確か。火縄銃は雨に弱く、1発撃つのに20秒以上かかった──だからこそ「組織的に使う工夫」が時代を変えた。"},
  meirei:{icon:"📜", name:"燃え残った命令書",
    basic:"「明智光秀に命ず。中国地方へ出陣し、羽柴秀吉を助けよ」── 信長本人の命令書。1582年6月2日・本能寺の変。この命令が、皮肉にも光秀に1万3千の大軍を与えた。",
    goro:"いちごパンツ(1582)の本能寺",
    deep:"なぜ天下人目前の信長が、わずかな家来しか連れていなかったのか? このとき織田軍の主力は、毛利攻め(秀吉)・上杉攻め(柴田勝家)・関東(滝川一益)などに分散していた。「日本中に敵がいない」と思えた瞬間こそが、最大のすきだった。"},
  shogen:{icon:"🎏", name:"侍女の証言メモ",
    basic:"生き残った侍女の証言:「おそってきた軍の旗は、水色の桔梗(ききょう)の紋でした」── 水色桔梗は、明智家の家紋である。",
    deep:"信長は最期のとき、女性たちに「女はくるしからず(=女は逃げてよい)」と逃げ道を開けたと記録に残る。「是非に及ばず(=しかたあるまい)」の一言とあわせて、信長の最期の姿を伝える貴重な証言だ。"},
  froisu:{icon:"✝️", name:"フロイスの記録",
    basic:"キリスト教は1549年、宣教師フランシスコ・ザビエルが鹿児島に伝えた。信長はキリスト教を保護し、ポルトガル・スペインとの南蛮貿易がさかんになった。",
    goro:"以後よく(1549)広まるキリスト教",
    deep:"ザビエルたちはイエズス会という組織の宣教師。宣教師ルイス・フロイスは『日本史』という記録を残し、信長を「決断力があり、家臣にも尊大にふるまう人物」と生き生きと書いた。外国人の目から見た戦国日本が分かる、世界的にも貴重な史料だ。"},
  daicho:{icon:"📒", name:"堺の鉄砲台帳",
    basic:"堺は鉄砲の大量生産地として栄えた商業都市。種子島に伝わった鉄砲の技術は、堺や国友(滋賀県)に広まり量産された。",
    deep:"堺は大名に支配されず、会合衆(えごうしゅう)と呼ばれる豪商たちの合議で自治を行っていた。町の周りに堀をめぐらせ(環濠都市)、宣教師ヴィレラは「ベニス(イタリアの自治都市)のように自治が行われている」と本国に報告した。"},
  mokugeki:{icon:"👣", name:"家康の目撃メモ",
    basic:"事件のとき、徳川家康はわずかな供を連れて堺を見物中だった。事件を知ると、山の中を命がけで通って三河へ脱出した(伊賀越え)。",
    deep:"この「神君伊賀越え」は家康の生涯で最大の危機と言われる。ここを生きのびた男が、18年後の1600年に関ヶ原の戦いを制し、1603年に江戸幕府を開く ── 歴史はつながっている。"},
  kousatsu:{icon:"🏯", name:"楽市・楽座の高札",
    basic:"信長は安土城下で楽市・楽座を実施。市場の税を免除し、座(商人の組合)の特権を廃止して、だれでも自由に商売できるようにした。関所も廃止した。",
    goro:"「楽」=規制をなくしてラクに商売",
    deep:"信長の強さの秘密は「経済」。自由な商売で町がにぎわえば、人・モノ・お金・情報が集まり、それが軍資金になる。信長の印章「天下布武(てんかふぶ)」は武力だけでなく、新しい仕組みで天下を治める意志の表れとも言われる。"},
  hieizan:{icon:"🔥", name:"比叡山焼き討ちの記録",
    basic:"信長は1571年、敵対した比叡山延暦寺(ひえいざんえんりゃくじ)を焼き討ちにした。また各地の一向一揆(いっこういっき)や石山本願寺とも長く戦った。",
    deep:"当時の延暦寺や本願寺は、僧兵という武力と、広大な領地・経済力を持つ「戦国大名なみの勢力」だった。石山本願寺との戦いは約10年続いた。この「仏をもおそれぬ厳しさ」への反発が、光秀の動機の一つになったという説もある。"},
  mizuzeme:{icon:"🌊", name:"水攻めの絵図",
    basic:"事件のとき、羽柴秀吉は備中高松城(岡山県)を水攻めの真っ最中だった。事件を知ると毛利氏とすぐ和睦し、京都まで約200kmを約10日で駆けもどった(中国大返し)。",
    deep:"川をせき止める長大な堤防を短期間で築いた土木力と、だれよりも早く正確な情報をつかむ力 ── これが秀吉の武器。この力はのちの太閤検地(全国の土地調査)や大阪城の築城につながっていく。"},
  chizu:{icon:"🗺️", name:"進軍ルートの地図",
    basic:"中国地方へ向かうはずの1万3千の軍が、老ノ坂(おいのさか)峠で進路を東へ変え、桂川を越えて京都へ。指揮官は全軍に告げた──「敵は本能寺にあり」。",
    goro:"セリフごと覚えよう:「敵は本能寺にあり」",
    deep:"老ノ坂は「西へ行くか、東(京都)へ行くか」の分かれ道。ここで東を選んだ瞬間、歴史が動いた。なお「敵は本能寺にあり」という言葉自体は後世の書物に書かれたもので、本当に言ったかは分かっていない──史料を疑う目も、探偵の力だ。"},
  tanzaku:{icon:"🎋", name:"愛宕百韻の短冊",
    basic:"事件の数日前、光秀は愛宕山(あたごやま)で連歌の会を開き、こう詠んだ──「ときは今 あめが下しる 五月(さつき)かな」。",
    deep:"「とき」は光秀の一族・土岐(とき)氏、「あめが下しる」は「天が下知る=天下を治める」に掛けられており、謀反(むほん)の決意表明だという説が有名。ただし「単に五月雨の季節を詠んだだけ」という説もある。一つの歌をどう読むか──解釈が分かれるのも歴史の面白さだ。"}
};
const ITEM_ORDER = ["teppo","meirei","shogen","froisu","daicho","mokugeki","kousatsu","hieizan","mizuzeme","chizu","tanzaku"];

/* ---------- 人物 ---------- */
const PEOPLE = {
  shino:{mon:"忍", color:"#a08cb0", name:"侍女・しの", role:"本能寺の生き残り",
    intro:"「……探偵様。あの夜のことを、お話しします」",
    topics:[
      {id:"yoru", label:"あの夜、何があった?",
       lines:["「明け方でした。ときの声と鉄砲の音で目が覚めたのです。寺はもう、大軍に囲まれておりました」",
              "「上様(信長様)は敵の襲来を知ると、ただ一言──『是非に及ばず』と。そして自ら弓を取って戦われました」"]},
      {id:"hata", label:"敵の軍の旗印は?",
       lines:["「……水色の、桔梗(ききょう)の紋でございました。あの旗を、わたくしは生涯忘れません」",

      {id:"nobunaga", label:"信長はどんな人だった?",
       lines:["「恐ろしいお方、と世間は言います。ですが最期のとき、上様は私たち女性に『女はくるしからず』と、逃げ道を開けてくださいました」",
              "「厳しさとお優しさの、両方をお持ちの方でした」"]}

  froi:{mon:"福", color:"#7a9e9f", name:"ルイス・フロイス", role:"宣教師(イエズス会)",

    topics:[
      {id:"kirisuto", label:"キリスト教はいつ日本に?",
       lines:["「1549年、我らの先輩フランシスコ・ザビエルが、カゴシマに上陸して伝えまシタ」",

function LocationScreen({loc, go, items, addItem, spotsDone, markSpot, openItem}){

  const person = loc.person? PEOPLE[loc.person] : null;
  return (

      <TopBar onBack={()=>go("map")} label="← マップへ"/>

      {loc.spots.length>0 && <div className="eyebrow">調べる</div>}

        const done = spotsDone[loc.id+":"+sp.id];
        return (
          <button key={sp.id} className={"spot"+(done?" done":"")} onClick={()=>{

            if(sp.gives) addItem(sp.gives);
            markSpot(loc.id, sp.id);

            <span className="sicon">{sp.icon}</span>{sp.label}
            {done && <span className="check">✓</span>}
          </button>
        );
      })}

      {person && (
        <div style={{marginTop:14}}>
          <div className="eyebrow">話を聞く</div>
          <button className="spot" onClick={()=>go("talk", loc.person)}>
            <span className="sicon">💬</span>{person.name}({person.role})と話す
          </button>
        </div>
      )}

      {view && (
        <div className="modal-bg" onClick={()=>setView(null)}>
          <div className="modal-card paper" onClick={e=>e.stopPropagation()}>
            <div className="meta">調査記録</div>

          </div>
        </div>
      )}
    </div>
  );
}

            <span className="gicon">⚖️</span>
            <span className="gt">捜査完了! マップの【推理】が解放された</span>
          </div>
        )}
        <button className="btn primary block" onClick={()=>setCurrent(null)}>質問一覧へもどる</button>
      </div>
    );
  }

  return (
    <div>
      <TopBar onBack={()=>go("loc", backLocId)} label="← 場所へもどる"/>
      <div className="person-head">
        <div className="person-mon mincho" style={{color:person.color, borderColor:person.color}}>{person.mon}</div>
        <div><div className="rl">{person.role}</div><div className="nm mincho">{person.name}</div></div>
      </div>
      <div className="serif-line">{person.intro}</div>
      <div className="eyebrow" style={{marginTop:14}}>質問する</div>
      {person.topics.map(tp=>{
        const locked = tp.needs && !tp.needs.every(has);
        const done = talked[personId+":"+tp.id];
        return (
          <button key={tp.id} className={"topic"+(locked?" locked":"")+(done?" done":"")}
            onClick={()=>{
              if(locked) return;

              markTalk(personId, tp.id);

        );
      })}

  );

/* ---------- 推理 ---------- */
function Deduction({go}){
  const [idx,setIdx]=useState(0);
  const [picked,setPicked]=useState(null);
  const q=DEDUCTION[idx];
  const correct=picked===q.a;
  return (
    <div>
      <TopBar onBack={()=>go("map")} label="← マップへ"/>
      <div className="eyebrow">最終章 ── 推理</div>
      <div className="q-num mincho">{idx+1} / {DEDUCTION.length}</div>
      <div className="q-text">{q.q}</div>
      <div className="choices">
        {q.c.map((c,i)=>(
          <button key={i} className={"choice"+(picked===null?"":(i===q.a?" correct":(i===picked?" wrong":"")))}
            onClick={()=>{ if(picked===null) setPicked(i); }}>{c}</button>
        ))}
      </div>
      {picked!==null && (
        <div>
          <div className={"fb "+(correct?"ok":"ng")}>{correct? q.ok : q.ng}</div>
          <div style={{marginTop:14}}>
            {correct
              ? <button className="btn primary block" onClick={()=>{ if(idx+1<DEDUCTION.length){setIdx(idx+1);setPicked(null);} else go("truth"); }}>
                  {idx+1<DEDUCTION.length? "次の推理へ":"真相を開く"}</button>
              : <button className="btn block" onClick={()=>setPicked(null)}>もう一度考える</button>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- 真相 ---------- */
function Truth({go}){
  return (
    <div>
      <TopBar onBack={()=>go("map")} label="マップへ"/>
      <div className="eyebrow">解決 ── 真相</div>
      <div className="paper">
        <div className="secret-stamp mincho">解決</div>
        <div className="meta">事件簿 結び</div>
        <h3 className="mincho">「敵は本能寺にあり」</h3>
        {TRUTH.map((t,i)=><P key={i}>{t}</P>)}
      </div>
      <div className="paper">
        <div className="meta">歴史のナゾ ── 光秀の動機、君はどの説?</div>
        <h3 className="mincho">日本史最大のミステリー</h3>
        <ul>{SETSU.map((s,i)=><li key={i}><b>{s.t}</b> ── {s.d}</li>)}</ul>
      </div>
      <div className="eyebrow" style={{marginTop:20}}>そして歴史は動く</div>
      <div className="tl">
        {EPILOGUE.map((e,i)=>(
          <div key={i} className="tl-row">
            <div className="yr mincho">{e.yr} {e.t}</div>
            <div className="ev" style={{fontSize:14, color:"#d8d2c2"}}>{e.d}</div>
          </div>
        ))}
      </div>
      <button className="btn primary block" onClick={()=>go("dojo")}>一問一答道場で腕試し(全20問)</button>
      <div style={{height:10}}/>
      <button className="btn block" onClick={()=>go("timeline")}>年表で復習する</button>
    </div>
  );
}

/* ---------- 道場 ---------- */
function Dojo({go}){
  const [idx,setIdx]=useState(0);
  const [picked,setPicked]=useState(null);
  const [score,setScore]=useState(0);
  const [fin,setFin]=useState(false);
  const total=QUIZ.length;

  if(fin){
    const rank=RANKS.find(r=>score>=r.min);
    return (
      <div>
        <TopBar onBack={()=>go("cover")} label="表紙へ"/>
        <div className="eyebrow">道場 ── 結果発表</div>
        <div className="paper" style={{textAlign:"center"}}>
          <div className="meta">認定証</div>
          <p style={{marginBottom:0}}>{total}問中 <b style={{fontSize:24}}>{score}</b> 問正解</p>
          <div className="rank-big mincho">{rank.name}</div>
          <P>{rank.msg}</P>
        </div>
        <button className="btn primary block" onClick={()=>{setIdx(0);setPicked(null);setScore(0);setFin(false);}}>もう一周する</button>
        <div style={{height:10}}/>
        <button className="btn block" onClick={()=>go("timeline")}>年表で復習する</button>
      </div>
    );
  }
  const q=QUIZ[idx];
  const correct=picked===q.a;
  return (
    <div>
      <TopBar onBack={()=>go("cover")} label="表紙へ"/>
      <div className="eyebrow">一問一答道場</div>
      <div className="score-bar">
        <span className="mincho">第 {idx+1} 問 / {total}</span>
        <span>正解 {score}</span>
      </div>
      <div className="q-text">{q.q}{q.adv && <span className="adv-tag">発展</span>}</div>
      <div className="choices">
        {q.c.map((c,i)=>(
          <button key={i} className={"choice"+(picked===null?"":(i===q.a?" correct":(i===picked?" wrong":"")))}
            onClick={()=>{ if(picked===null){ setPicked(i); if(i===q.a) setScore(s=>s+1);} }}>{c}</button>
        ))}
      </div>
      {picked!==null && (
        <div>
          <div className={"fb "+(correct?"ok":"ng")}>
            <b>{correct?"正解!":"ざんねん!"}</b> {q.ex}
            <div style={{fontSize:13, marginTop:4, opacity:.85}}>♪ {q.goro}</div>
          </div>
          <div style={{marginTop:14}}>
            <button className="btn primary block" onClick={()=>{
              if(idx+1<total){setIdx(idx+1);setPicked(null);} else setFin(true);
            }}>{idx+1<total?"次の問題へ":"結果を見る"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- 年表 ---------- */
function Timeline({go}){
  return (
    <div>
      <TopBar onBack={()=>go("cover")} label="表紙へ"/>
      <div className="eyebrow">戦国年表 ── これだけは書けるように</div>
      <div className="tl">
        {TIMELINE.map((t,i)=>(
          <div key={i} className="tl-row">
            <div className="yr mincho">{t.yr}</div>
            <div className="ev">{t.ev}</div>
            <div className="gr">{t.gr}</div>
          </div>
        ))}
      </div>
      <button className="btn primary block" onClick={()=>go("dojo")}>この年表で道場に挑む</button>
    </div>
  );
}

/* ---------- 先生用ガイド ---------- */
function Guide({go}){
  return (
    <div>
      <TopBar onBack={()=>go("cover")} label="表紙へ"/>
      <div className="eyebrow">先生用ガイド(v2 探索版)</div>
      <div className="paper">
        <div className="meta">授業で使う場合(20〜30分)</div>
        <h3 className="mincho">授業パターン ── ペア探偵</h3>
        <ul>
          <li>導入3分:序章を音読し「犯人はだれだと思う?」と予想を立てさせてから探索開始。</li>
          <li>探索15分:2人1組の「ペア探偵」がおすすめ。証拠を1つ入手するたびに、相方に赤枠(テストに出る)の内容を自分の言葉で説明する。説明できたら記録用紙に◯、あやしければ△をつける。</li>
          <li>探索の順番は自由なので、「どこから調べる?」と生徒に決めさせてください。自分で選ぶことが集中力を生みます。</li>
          <li>まとめ10分:光秀への「つきつけ」→推理→真相。青枠の発展は、余裕のある生徒・上位校志望の生徒向けに。</li>
          <li>チェック:道場20問(基本15+発展5)。基本15問の8割(12問)を合格ラインの目安に、△✕の問題は解説と語呂を読み直してその場で解き直しを。</li>
        </ul>
      </div>
      <div className="paper">
        <div className="meta">自習・宿題で使う場合</div>
        <h3 className="mincho">生徒ひとりでやるパターン</h3>
        <ul>
          <li>1周目:マップを自由に探索し、証拠11個をコンプリート(約20〜25分)。ゲーム感覚でOK。</li>
          <li>2周目:道場20問→まちがえた問題の解説と語呂を音読→もう1周。</li>
          <li>仕上げ:年表を紙に書き出せたら合格。発展問題まで全問正解なら「天下人」認定!</li>
          <li>テスト前は「年表→道場」で1セット10分の復習に。発展の青枠は高校入試の資料問題対策にもなります。</li>
        </ul>
      </div>
      <button className="btn block" onClick={()=>go("cover")}>表紙へもどる</button>
    </div>
  );
}

/* ---------- App ---------- */
function App(){
  const [screen,setScreen]=useState("cover");
  const [locId,setLocId]=useState(null);
  const [personId,setPersonId]=useState(null);
  const [items,setItems]=useState({});
  const [talked,setTalked]=useState({});
  const [spotsDone,setSpotsDone]=useState({});
  const [confessed,setConfessed]=useState(false);
  const [invOpen,setInvOpen]=useState(false);
  const [itemModal,setItemModal]=useState(null);

  const go=(s, arg)=>{
    if(s==="loc") setLocId(arg);
    if(s==="talk") setPersonId(arg);
    setScreen(s); window.scrollTo(0,0);
  };
  const addItem=id=>setItems(v=>({...v,[id]:true}));
  const markTalk=(p,t)=>setTalked(v=>({...v,[p+":"+t]:true}));
  const markSpot=(l,s)=>setSpotsDone(v=>({...v,[l+":"+s]:true}));
  const locDone=L=>{
    const spotsOk = L.spots.every(sp=>spotsDone[L.id+":"+sp.id]);
    const personOk = !L.person || PEOPLE[L.person].topics.every(tp=>talked[L.person+":"+tp.id] || (tp.needs && !tp.needs.every(n=>items[n])));
    return spotsOk && personOk && (L.spots.length>0 || L.person);
  };
  const loc = LOCATIONS.find(l=>l.id===locId);

  return (
    <div>
      {screen==="cover" && <Cover go={go}/>}
      {screen==="prologue" && <Prologue go={go}/>}
      {screen==="map" && <MapScreen go={go} items={items} confessed={confessed} openInv={()=>setInvOpen(true)} locDone={locDone}/>}
      {screen==="loc" && loc && <LocationScreen loc={loc} go={go} items={items} addItem={addItem} spotsDone={spotsDone} markSpot={markSpot} openItem={id=>setItemModal(id)}/>}
      {screen==="talk" && personId && <TalkScreen personId={personId} backLocId={locId} go={go} items={items} addItem={addItem} talked={talked} markTalk={markTalk} openItem={id=>setItemModal(id)} setConfessed={setConfessed}/>}
      {screen==="deduction" && <Deduction go={go}/>}
      {screen==="truth" && <Truth go={go}/>}
      {screen==="dojo" && <Dojo go={go}/>}
      {screen==="timeline" && <Timeline go={go}/>}
      {screen==="guide" && <Guide go={go}/>}
      {invOpen && <InventoryModal items={items} close={()=>setInvOpen(false)} openItem={id=>{setInvOpen(false); setItemModal(id);}}/>}
      {itemModal && <ItemModal itemId={itemModal} close={()=>setItemModal(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
